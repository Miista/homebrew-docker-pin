version: 2

builds:
  - id: docker-pin
    main: ./cmd/docker-pin
    binary: docker-pin
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: docker-upgrade
    main: ./cmd/docker-upgrade
    binary: docker-upgrade
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: docker-unpin
    main: ./cmd/docker-unpin
    binary: docker-unpin
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    builds: [docker-pin, docker-upgrade, docker-unpin]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*  # binaries only

checksum:
  name_template: checksums.txt

brews:
  - name: docker-pin
    repository:
      owner: Miista
      name: homebrew-docker-pin
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-docker-pin
    description: Docker CLI plugins to pin and upgrade container images by tag and SHA digest
    install: |
      (lib/"docker/cli-plugins").install "docker-pin", "docker-upgrade", "docker-unpin"
      plugin_dir = Pathname.new(ENV.fetch("HOME", Dir.home))/".docker/cli-plugins"
      plugin_dir.mkpath
      %w[docker-pin docker-upgrade docker-unpin].each do |b|
        system "ln", "-sf", (lib/"docker/cli-plugins/#{b}").to_s, (plugin_dir/b).to_s
      end
    test: |
      system "#{lib}/docker/cli-plugins/docker-pin", "docker-cli-plugin-metadata"
